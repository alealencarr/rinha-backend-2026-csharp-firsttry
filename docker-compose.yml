# =============================================================================
# Rinha de Backend 2026 - submissão (.NET 9 NativeAOT)
#
# IMPORTANTE (causa das suas rejeições anteriores):
#  - NÃO existe diretiva `build:`. Só imagens PRÉ-CONSTRUÍDAS e PÚBLICAS.
#  - Troque `SEU_USUARIO_DOCKERHUB` pelo seu usuário e publique a imagem ANTES
#    (veja build-and-push.sh). A imagem precisa ser pullável sem login.
#
# Limites: api1 0.40 + api2 0.40 + nginx 0.20 = 1.00 CPU | 150+150+48 = 348 MB.
# =============================================================================
services:
  api1:
    image: docker.io/alealencarr/rinha-fraud-dotnet:latest
    environment:
      - RESOURCES_DIR=/app
      - DOTNET_GCHeapHardLimitPercent=75
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    image: docker.io/alealencarr/rinha-fraud-dotnet:latest
    environment:
      - RESOURCES_DIR=/app
      - DOTNET_GCHeapHardLimitPercent=75
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "48MB"

networks:
  app:
    driver: bridge
