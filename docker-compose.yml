services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    image: rinha-fraud-dotnet:latest
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "163MB"

  api2:
    image: rinha-fraud-dotnet:latest
    depends_on: [api1]
    build:                      
      context: .
      dockerfile: Dockerfile    
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "163MB"

  nginx:
    image: nginx:1.27-alpine
    depends_on: [api1, api2]
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "24MB"

networks:
  app:
    driver: bridge