services:
  api1:
    image: docker.io/alealencarr/rinha-fraud-dotnet:latest
    environment:
      - RESOURCES_DIR=/app
      - DOTNET_GCHeapHardLimitPercent=75
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    image: docker.io/alealencarr/rinha-fraud-dotnet:latest
    environment:
      - RESOURCES_DIR=/app
      - DOTNET_GCHeapHardLimitPercent=75
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "48MB"

networks:
  app:
    driver: bridge
