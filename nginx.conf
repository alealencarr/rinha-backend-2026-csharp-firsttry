worker_processes 1;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/stderr error;

    # Pure round-robin across the two API instances. No business logic:
    # nginx never inspects or transforms the body, it only forwards.
    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 64;
    }

    server {
        listen 9999 default_server;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
