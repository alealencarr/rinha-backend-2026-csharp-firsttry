worker_processes auto;
worker_rlimit_nofile 200000;
error_log /dev/null crit;
pid /tmp/nginx.pid;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    tcp_nodelay on;
    tcp_nopush on;
    keepalive_requests 1000000;
    keepalive_timeout 300s;

    # Round-robin puro entre as duas APIs.          
    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 512;            # conexões persistentes p/ upstream (menos latência)
    }

    server {
        listen 9999 reuseport backlog=16384;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";          # habilita keepalive p/ upstream

            proxy_buffering off;                     # resposta minúscula: sem buffer

            # Se uma instância ainda está carregando (503), reencaminha p/ a outra.
            # non_idempotent permite o retry em POST (corpo é bufferizado por padrão).
            proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 2s;

            proxy_connect_timeout 1s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
